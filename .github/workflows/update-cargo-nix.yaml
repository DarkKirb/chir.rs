name: Automatically update Cargo.nix
on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  workflow_dispatch: {}
jobs:
  update-cargo-nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v21
        with:
          extra_nix_config: |
            trusted-public-keys = nixcache:8KKuGz95Pk4UJ5W/Ni+pN+v+LDTkMMFV4yrGmAYgkDg= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.chir.rs/ https://cache.nixos.org/
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - run: echo yes | nix run github:cargo2nix/cargo2nix
      - run: nix fmt
      - uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: Update Cargo.nix
